services:
  app:
    image: busybox:uclibc
    restart: unless-stopped
    volumes:
      - "/nix:/nix"
    command: [
      "${NIX_SERVE_BIN}",
      "--host", "0.0.0.0",
      "--port", "8080"
    ]

  nar-cache:
    image: nginx:mainline-alpine
    restart: unless-stopped
    volumes:
      - "/nix:/nix"
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf/nar-cache.conf:/etc/nginx/conf.d/nar-cache.conf:ro

  web:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - "./conf/Caddyfile:/etc/caddy/Caddyfile"
      - "caddy_data:/data"

volumes:
  caddy_data:
