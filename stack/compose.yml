services:
  app:
    image: busybox:uclibc
    restart: unless-stopped
    volumes:
      # /nix only provides atticd's own runtime closure (the injected binary), NOT
      # the served cache — Attic keeps its NARs/chunks + db in the attic_data volume.
      - "/nix:/nix:ro"
      - "./conf/server.toml:/etc/attic/server.toml:ro"
      - "/nix/attic:/data"
    environment:
      # JWT signing secret — never committed. Generate once with
      # `openssl rand 64 | base64 -w0` and provide via the host env / .env file.
      ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64: "${ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64}"
    command: [
      "${ATTICD_BIN}",
      "-f", "/etc/attic/server.toml",
      "--mode", "monolithic"
    ]
    # Highest priority: chunk reassembly + SQLite are the heaviest workloads.
    deploy:
      resources:
        limits:
          memory: 320m
        reservations:
          memory: 128m
    oom_score_adj: -500

  nar-cache:
    image: nginx:mainline-alpine
    restart: unless-stopped
    volumes:
      # Cache lives on disk at /nix/nar-cache (the /nix volume has the space).
      - "/nix:/nix"
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf/nar-cache.conf:/etc/nginx/conf.d/nar-cache.conf:ro
      # Shared tmpfs for the unix socket (Caddy → nginx without TCP overhead).
      - sockets:/run/nginx
    # Second priority: serves cached NARs without hitting atticd.
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m
    oom_score_adj: -400

  web:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - "./conf/Caddyfile:/etc/caddy/Caddyfile:ro"
      - "caddy_data:/data"
      # Shared socket volume to reach nginx without TCP.
      - sockets:/run/nginx:ro
    # Lowest priority: Caddy only does TLS termination + proxying.
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    oom_score_adj: 100

volumes:
  caddy_data:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=0777
