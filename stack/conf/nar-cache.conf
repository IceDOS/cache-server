# Client/CDN cache policy by response status. Nix store objects are immutable,
# but 404s (path not in this cache yet) must NOT be cached long, or a later push
# stays invisible to clients holding a cached negative lookup.
map $status $nar_cache_control {
  default "no-cache";
  200     "public, max-age=31536000, immutable";
  301     "public, max-age=31536000, immutable";
  302     "public, max-age=31536000, immutable";
}

proxy_cache_path /nix/nar-cache levels=1:2 keys_zone=nar-cache:4m max_size=16g inactive=365d use_temp_path=off;

server {
  listen 8080;
  server_name nar-cache;

  client_max_body_size 0;

  location / {
    proxy_cache nar-cache;
    proxy_pass http://app:8080;
    proxy_http_version 1.1;
    proxy_set_header Connection "keep-alive";

    # atticd reassembles + decompresses each NAR from its chunks on every request.
    # Cache the result so repeat pulls of a hot path don't re-hit it. Store objects
    # are content-addressed (immutable), so force-cache by URI and ignore upstream
    # cache headers. Without this the proxy_cache stays near-empty and every request
    # re-hits atticd -> pegs the single-core box.
    proxy_ignore_headers X-Accel-Expires Expires Cache-Control Set-Cookie;
    proxy_cache_valid 200 301 302 365d;
    proxy_cache_valid 404 1m;

    # Serialize concurrent misses for the same object: only one request reaches
    # atticd, the rest wait for it. Critical on a single core.
    proxy_cache_lock on;
    proxy_cache_lock_timeout 60s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    add_header Cache-Control $nar_cache_control always;
    add_header X-Cache-Status $upstream_cache_status always;
  }
}
