# nginx = the disk-cache layer in front of atticd (shields its single core from
# repeat NAR reassembly). It listens on localhost only; Caddy is the public TLS
# edge and forwards cacheable traffic here. Self-contained (run via `nginx -c`
# from the supervisor) — no /etc/nginx, no mime.types include, logs to stderr so
# the supervisor/journal captures them.
user root;
worker_processes 1;

error_log stderr warn;
pid /run/icedos-nginx.pid;

events {
  worker_connections 512;
  multi_accept on;
}

http {
  default_type application/octet-stream;

  # Access logging off — CPU/IO-bound box (journald was removed for the same
  # reason); per-request logs have no value for a cache. Errors via error_log.
  access_log off;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Small proxy buffers — NARs stream through; the disk cache handles storage.
  proxy_buffering on;
  proxy_buffer_size 4k;
  proxy_buffers 4 16k;
  proxy_busy_buffers_size 32k;
  proxy_max_temp_file_size 64m;

  # Client/CDN cache policy by status. Store objects are immutable; 404s (path
  # not cached yet) must NOT be cached long or a later push stays invisible.
  map $status $nar_cache_control {
    default "no-cache";
    200     "public, max-age=31536000, immutable";
    301     "public, max-age=31536000, immutable";
    302     "public, max-age=31536000, immutable";
  }

  # Disk cache. Space is abundant, so size it large to maximise hit rate — every
  # hit is a NAR atticd's single core never reassembles.
  proxy_cache_path /nix/nar-cache levels=1:2 keys_zone=nar-cache:8m max_size=64g inactive=365d use_temp_path=off;

  upstream atticd {
    server 127.0.0.1:8080;
    keepalive 8;
  }

  server {
    listen 127.0.0.1:8081;

    # Cache fd + metadata — fewer open/stat/close syscalls per hit (matters on 1 core).
    open_file_cache max=4096 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    location / {
      proxy_cache nar-cache;
      proxy_pass http://atticd;
      proxy_http_version 1.1;
      # Clear Connection so HTTP/1.1 keep-alive to atticd uses the pool above.
      proxy_set_header Connection "";

      # atticd reassembles each NAR from chunks per request. Cache the result
      # (content-addressed/immutable) so repeat pulls don't re-hit it. Caddy
      # already split uploads off to atticd directly, so traffic here is GETs.
      proxy_ignore_headers X-Accel-Expires Expires Cache-Control Set-Cookie;
      proxy_cache_valid 200 301 302 365d;
      proxy_cache_valid 404 1m;

      # Coalesce concurrent misses: one request reaches atticd, the rest wait.
      # Long timeouts because a cold large NAR (kernel/cuda) can take >60s to
      # reassemble on one core; the 60s default would 504 + stampede atticd.
      proxy_cache_lock on;
      proxy_cache_lock_timeout 300s;
      proxy_read_timeout 300s;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

      add_header Cache-Control $nar_cache_control always;
      add_header X-Cache-Status $upstream_cache_status always;
    }
  }
}
