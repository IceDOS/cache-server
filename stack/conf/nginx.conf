user root;
worker_processes 1;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 512;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server_names_hash_bucket_size 128;

  # Buffered access log reduces per-request write syscalls.
  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent $upstream_cache_status';
  access_log /var/log/nginx/access.log main buffer=16k flush=30s;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  keepalive_timeout 65;

  # Reduce proxy buffer memory — NARs stream through, no need to buffer entire
  # responses in RAM. Let the disk cache handle storage.
  proxy_buffering on;
  proxy_buffer_size 4k;
  proxy_buffers 4 16k;
  proxy_busy_buffers_size 32k;

  # Limit temp file usage to control disk I/O for large NARs in-flight.
  proxy_max_temp_file_size 64m;

  include /etc/nginx/conf.d/*.conf;
}
