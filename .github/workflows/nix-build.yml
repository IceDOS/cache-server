name: Nix Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_HOST_KEY }}" >~/.ssh/known_hosts
          touch ~/.ssh/config
          echo "Host cache-server" >>~/.ssh/config
          echo "  HostName ${{ secrets.SSH_HOST }}" >>~/.ssh/config
          echo "  User ${{ secrets.SSH_USER }}" >>~/.ssh/config
      - name: Extract Nix signing key
        run: 'echo "$NIX_SIGNING_KEY" > nix-private.pem'
        shell: bash
        env:
          NIX_SIGNING_KEY: ${{ secrets.NIX_SIGNING_KEY }}
      - name: Run Nix Build
        run: nix run .#build
        env:
          NIX_SUBSTITUTER: ${{ vars.NIX_SUBSTITUTER }}
