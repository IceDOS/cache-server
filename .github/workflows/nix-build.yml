name: Nix Build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Single-user install: runner owns /nix so cache-nix-action can restore into it.
      # (Multi-user install-nix-action leaves /nix root-owned -> restore "Permission denied".)
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            nix-path = nixpkgs=channel:nixos-unstable
            keep-env-derivations = true
            keep-outputs = true
            max-jobs = auto
            cores = 0
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'config/config.toml.final') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # Cap the saved store below GitHub's 10GB/repo cache ceiling
          gc-max-store-size: 8000000000
          # Keep only the freshest cache for this prefix
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_HOST_KEY }}" >~/.ssh/known_hosts
          touch ~/.ssh/config
          echo "Host cache-server" >>~/.ssh/config
          echo "  HostName ${{ secrets.SSH_HOST }}" >>~/.ssh/config
          echo "  User ${{ secrets.SSH_USER }}" >>~/.ssh/config
      - name: Extract Nix signing key
        run: 'echo "$NIX_SIGNING_KEY" > nix-private.pem'
        shell: bash
        env:
          NIX_SIGNING_KEY: ${{ secrets.NIX_SIGNING_KEY }}
      - name: Run Nix Build
        run: nix run .#build
