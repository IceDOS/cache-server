name: Nix Build

# Dispatch-only. Every trigger is an explicit API dispatch: auto-update.yml here after a
# lock bump, and the update-mesa / update-shadps4 updaters in hardware / apps after they
# pin something new. A push trigger would double-build on top of those dispatches.
on:
  workflow_dispatch:

permissions:
  actions: write

concurrency:
  # Queue auto-triggered builds instead of cancelling — a cancel would kill an
  # in-progress (expensive) kernel compile and leave the cache unpopulated.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Reclaim /mnt for a large /nix store (runner / is only ~17 GB). MUST run before Nix is
      # installed (the action aborts if /nix already exists). nix-permission-edict gives the runner
      # user ownership of /nix so the single-user install + cache-nix-action restore can write into it.
      - uses: wimpysworld/nothing-but-nix@v10
        with:
          hatchet-protocol: 'rampage'
          nix-permission-edict: true
          # Keep enough free on / for the post-run cache-nix-action tarball.
          # rampage otherwise reclaims / down to the 2 GB default, too small for
          # cache.tzst (~half of gc-max-store-size, ~4 GB) -> "No space left on
          # device". The build still has ~100 GB across / + /mnt.
          root-safe-haven: '10240'
      # Single-user install: runner owns /nix so cache-nix-action can restore into it.
      # (Multi-user install-nix-action leaves /nix root-owned -> restore "Permission denied".)
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            nix-path = nixpkgs=channel:nixos-unstable
            keep-env-derivations = true
            keep-outputs = true
            max-jobs = auto
            cores = 0
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'config/*.toml') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # Cap the saved store below GitHub's 10GB/repo cache ceiling
          gc-max-store-size: 8000000000
          # Keep only the freshest cache for this prefix
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - name: Attic login
        run: |
          nix profile install nixpkgs#attic-client
          attic login icedos "$ICEDOS_SUBSTITUTER" "$ATTIC_TOKEN"
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          ICEDOS_SUBSTITUTER: ${{ vars.ICEDOS_SUBSTITUTER }}
      - name: Run Nix Build
        run: nix run .#build
        env:
          ICEDOS_SUBSTITUTER: ${{ vars.ICEDOS_SUBSTITUTER }}
