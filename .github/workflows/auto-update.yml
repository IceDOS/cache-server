name: Auto Update flake.lock

on:
  schedule:
    # Every 30 minutes (UTC). GitHub may delay or skip scheduled runs under load,
    # and they only run on the default branch.
    - cron: "*/30 * * * *"
  workflow_dispatch:

# contents:write to push the lock bump; actions:write to dispatch the build.
permissions:
  contents: write
  actions: write

# Never run two updaters at once; let an in-flight one finish.
concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Update nixpkgs and detect change
        id: update
        run: |
          old=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          nix flake update
          new=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          echo "nixpkgs: $old -> $new"
          if [ "$old" = "$new" ]; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
          else
            echo "changed=true" >>"$GITHUB_OUTPUT"
            echo "short=${new:0:12}" >>"$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore(flake): bump nixpkgs to ${{ steps.update.outputs.short }}"
          git push

      # nix-build.yml is dispatch-only, and a GITHUB_TOKEN push would not cascade-trigger
      # it in any case. Same shape as the updaters in hardware and apps, minus their App
      # token — dispatching within the repo only needs this job's own actions:write.
      - name: Trigger build
        if: steps.update.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nix-build.yml',
              ref: context.ref.replace('refs/heads/', ''),
            });
